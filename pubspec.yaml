name: recipe_app
description: Context-Aware Recipe Discovery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local Storage
  hive_flutter: ^1.1.0

  # Images
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # UI
  shimmer: ^3.0.0
  rxdart:

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  custom_lint:
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
